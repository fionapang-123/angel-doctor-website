<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="320" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDF2F8"/>
      <stop offset="100%" stop-color="#EEF4FF"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="16" fill="url(#bg1)"/>
  <!-- Clock icon -->
  <circle cx="60" cy="60" r="28" fill="white" stroke="#e628a8" stroke-width="2"/>
  <circle cx="60" cy="60" r="2" fill="#e628a8"/>
  <line x1="60" y1="60" x2="60" y2="42" stroke="#e628a8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="60" x2="72" y2="55" stroke="#e628a8" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrows comparison -->
  <text x="140" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#c51e8c" font-weight="600" text-anchor="middle" letter-spacing="1">CHINA</text>
  <rect x="110" y="46" width="60" height="8" rx="4" fill="#e628a8" opacity="0.15"/>
  <rect x="110" y="46" width="22" height="8" rx="4" fill="#e628a8"/>
  <text x="180" y="54" font-family="system-ui, sans-serif" font-size="9" fill="#5b6675">1–2 weeks</text>
  <text x="140" y="76" font-family="system-ui, sans-serif" font-size="10" fill="#5b6675" font-weight="500" text-anchor="middle" letter-spacing="1">WESTERN</text>
  <rect x="110" y="84" width="60" height="8" rx="4" fill="#D1D5DB"/>
  <rect x="110" y="84" width="52" height="8" rx="4" fill="#9CA3AF"/>
  <text x="180" y="92" font-family="system-ui, sans-serif" font-size="9" fill="#5b6675">3–6 months</text>
  <!-- Big number -->
  <text x="160" y="135" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="#e628a8" text-anchor="middle" opacity="0.12">95%</text>
  <text x="160" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#c51e8c" text-anchor="middle" font-weight="600">up to 95% faster access</text>
  <text x="160" y="175" font-family="system-ui, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">From first contact to hospital visit</text>
</svg>
