<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="320" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDF2F8"/>
      <stop offset="100%" stop-color="#EEF4FF"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="16" fill="url(#bg2)"/>
  <!-- Dollar icon -->
  <circle cx="60" cy="60" r="28" fill="white" stroke="#e628a8" stroke-width="2"/>
  <text x="60" y="66" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#e628a8" text-anchor="middle">$</text>
  <!-- Arrow down -->
  <path d="M215 50l-8 12-8-12" stroke="#e628a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="215" y1="62" x2="215" y2="98" stroke="#e628a8" stroke-width="2" stroke-linecap="round"/>
  <!-- Price boxes -->
  <rect x="100" y="52" width="82" height="20" rx="4" fill="#E5E7EB"/>
  <text x="141" y="66" font-family="system-ui, sans-serif" font-size="10" fill="#5b6675" text-anchor="middle" font-weight="500">$3,000–6,000</text>
  <rect x="100" y="90" width="82" height="20" rx="4" fill="#FCE7F3"/>
  <text x="141" y="104" font-family="system-ui, sans-serif" font-size="10" fill="#c51e8c" text-anchor="middle" font-weight="600">$600–900</text>
  <!-- Labels -->
  <text x="190" y="66" font-family="system-ui, sans-serif" font-size="9" fill="#5b6675">US / UK</text>
  <text x="190" y="104" font-family="system-ui, sans-serif" font-size="9" fill="#c51e8c" font-weight="500">China</text>
  <!-- Big number -->
  <text x="160" y="140" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#e628a8" text-anchor="middle" opacity="0.12">80%</text>
  <text x="160" y="158" font-family="system-ui, sans-serif" font-size="11" fill="#c51e8c" text-anchor="middle" font-weight="600">up to 80% less</text>
  <text x="160" y="175" font-family="system-ui, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">Example: dental implants, same materials</text>
</svg>
